{% extends "base/layout.html" %}
{% block title %}Page not found — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="section container-narrow" style="text-align:center; padding-top:var(--space-8);">
    <span class="eyebrow">Error 404</span>
    <h1>This page doesn't exist.</h1>
    <p>The page you're looking for may have moved, or the link might be incorrect.</p>
    <a href="{% url 'dashboard:home' %}" class="btn btn-primary">Back to home</a>
</div>
{% endblock %}
