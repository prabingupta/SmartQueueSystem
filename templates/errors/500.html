{% extends "base/layout.html" %}
{% block title %}Something went wrong — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="section container-narrow" style="text-align:center; padding-top:var(--space-8);">
    <span class="eyebrow">Error 500</span>
    <h1>Something went wrong on our end.</h1>
    <p>Our team has been notified. Please try again in a few minutes.</p>
    <a href="{% url 'dashboard:home' %}" class="btn btn-primary">Back to home</a>
</div>
{% endblock %}
