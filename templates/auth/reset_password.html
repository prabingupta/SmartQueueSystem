{% extends "base/layout.html" %}
{% block title %}Set a new password — {{ SITE_NAME }}{% endblock %}
{% block body %}
<div class="section" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="card container-narrow" style="max-width:420px;">
        <span class="eyebrow">Almost done</span>
        <h1 style="font-size:1.6rem; margin-top:var(--space-2);">Choose a new password</h1>

        <form method="post" action="#" novalidate>
            <input type="hidden" name="uid" value="{{ uidb64 }}">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="form-group">
                <label class="form-label" for="new_password">New password</label>
                <input class="form-control" type="password" id="new_password" name="new_password" required autofocus>
                <p class="form-hint">At least 8 characters, not all numeric, not too common.</p>
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm new password</label>
                <input class="form-control" type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">Reset password</button>
        </form>
    </div>
</div>
{% endblock %}
