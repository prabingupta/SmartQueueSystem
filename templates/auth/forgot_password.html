{% extends "base/layout.html" %}
{% block title %}Reset your password — {{ SITE_NAME }}{% endblock %}
{% block body %}
<div class="section" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="card container-narrow" style="max-width:420px;">
        <span class="eyebrow">Password reset</span>
        <h1 style="font-size:1.6rem; margin-top:var(--space-2);">Forgot your password?</h1>
        <p>Enter the email on your account and we'll send you a link to reset it.</p>

        <form method="post" action="#" novalidate>
            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input class="form-control" type="email" id="email" name="email" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">Send reset link</button>
        </form>

        <p class="text-soft" style="margin-top:var(--space-4); text-align:center;">
            <a href="{% url 'accounts:login' %}" style="color:var(--crimson-dark); font-weight:600;">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
